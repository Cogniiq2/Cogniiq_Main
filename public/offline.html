<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cogniiq Kundenbereich offline</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f7f7f4;
        color: #111827;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(92vw, 520px);
        border: 1px solid #e5e7eb;
        border-radius: 24px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 24px 90px rgba(15, 23, 42, 0.08);
      }
      p {
        color: #6b7280;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>Der Cogniiq Kundenbereich braucht eine aktive Verbindung, um geschützte Kundendaten sicher aus Supabase zu laden.</p>
    </main>
  </body>
</html>
