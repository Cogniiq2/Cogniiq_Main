<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="iq-mask">
      <!-- I letter -->
      <rect x="65" y="40" width="25" height="120" rx="2" />

      <!-- Q letter - outer circle -->
      <path d="M 130,50
               A 40,40 0 1,1 130,130
               A 40,40 0 1,1 130,50
               Z
               M 130,65
               A 25,25 0 1,0 130,115
               A 25,25 0 1,0 130,65
               Z"
            fill-rule="evenodd" />

      <!-- Q letter - tail -->
      <rect x="150" y="105" width="20" height="35" rx="2" transform="rotate(35 160 105)" />
    </clipPath>
  </defs>
</svg>
