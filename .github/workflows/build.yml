name: Build Verification

on:
  pull_request:
  push:
    branches:
      - main
      - 'correction/**'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-public-anon-key-placeholder
      VITE_OURA_CLIENT_ID: ci-public-oura-client-id-placeholder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Static receptionist migration convergence checks
        run: node .github/scripts/test-receptionist-migration-convergence.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  phase0-sql-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure PostgreSQL client
        run: |
          if ! command -v psql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes postgresql-client
          fi

      - name: Run Phase 0 migration smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash supabase/tests/run_phase0_migration_smoke.sh

      - name: Run receptionist persistence migration smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash supabase/tests/run_receptionist_persistence_smoke.sh

      - name: Run receptionist convergence migration smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash supabase/tests/run_receptionist_convergence_smoke.sh

      - name: Run client platform migration smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash supabase/tests/run_client_platform_smoke.sh

      - name: Run receptionist entitlement smoke test
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
        run: bash supabase/tests/run_receptionist_entitlement_smoke.sh
