name: Supabase Production Migration

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Git branch containing the migration
        required: true
        default: codex/receptionist-persistence
      mode:
        description: Audit history, run a dry run, or apply the migration
        required: true
        type: choice
        options:
          - audit-history
          - dry-run
          - apply
        default: dry-run
      confirmation:
        description: Required for apply mode. Must equal APPLY_RECEPTIONIST_PERSISTENCE.
        required: false
        default: ''

permissions:
  contents: read

concurrency:
  group: supabase-production-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Supabase production migration
    runs-on: ubuntu-latest
    env:
      TARGET_MIGRATION: 20260711120000_receptionist_persistence.sql
      TARGET_MIGRATION_PATH: supabase/migrations/20260711120000_receptionist_persistence.sql
      TARGET_MIGRATION_VERSION: 20260711120000
      ISOLATED_SOURCE_DIR: isolated-migration-source

    steps:
      - name: Checkout workflow tools
        uses: actions/checkout@v4

      - name: Checkout selected migration branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          path: migration-source

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      # Safety gate: this workflow is intentionally scoped to the receptionist
      # persistence migration and fails before linking if the selected branch
      # does not contain the expected migration file.
      - name: Verify expected migration exists
        run: test -f "migration-source/$TARGET_MIGRATION_PATH"

      # Safety gate: audit-history intentionally inspects the complete selected
      # source branch, but dry-run/apply must never include legacy migrations
      # from a production history that is known to be empty.
      - name: Create isolated receptionist migration workspace
        if: ${{ inputs.mode != 'audit-history' }}
        shell: bash
        run: |
          set -euo pipefail

          source_migration="migration-source/$TARGET_MIGRATION_PATH"
          isolated_root="$ISOLATED_SOURCE_DIR"
          isolated_migrations="$isolated_root/supabase/migrations"
          isolated_migration="$isolated_root/$TARGET_MIGRATION_PATH"

          test -f "$source_migration"
          source_sha_before="$(sha256sum "$source_migration" | awk '{print $1}')"

          rm -rf "$isolated_root"
          mkdir -p "$isolated_root"
          tar -C migration-source --exclude=.git -cf - . | tar -C "$isolated_root" -xf -

          test -f "$isolated_migration"
          isolated_sha_before="$(sha256sum "$isolated_migration" | awk '{print $1}')"
          if [ "$source_sha_before" != "$isolated_sha_before" ]; then
            echo "Isolated receptionist migration does not match the selected source file."
            exit 1
          fi

          find "$isolated_migrations" -mindepth 1 -maxdepth 1 ! -name "$TARGET_MIGRATION" -exec rm -rf {} +

          mapfile -t remaining_entries < <(find "$isolated_migrations" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort)
          if [ "${#remaining_entries[@]}" -ne 1 ]; then
            echo "Expected exactly one entry in the isolated migrations directory, found ${#remaining_entries[@]}."
            printf '%s\n' "${remaining_entries[@]}"
            exit 1
          fi

          if [ "${remaining_entries[0]}" != "$TARGET_MIGRATION" ]; then
            echo "Unexpected entry remained in the isolated migrations directory: ${remaining_entries[0]}"
            exit 1
          fi

          mapfile -t remaining_migrations < <(find "$isolated_migrations" -maxdepth 1 -type f -name '*.sql' -printf '%f\n' | sort)
          if [ "${#remaining_migrations[@]}" -ne 1 ]; then
            echo "Expected exactly one SQL migration in the isolated workspace, found ${#remaining_migrations[@]}."
            printf '%s\n' "${remaining_migrations[@]}"
            exit 1
          fi

          if [ "${remaining_migrations[0]}" != "$TARGET_MIGRATION" ]; then
            echo "Unexpected migration remained in the isolated workspace: ${remaining_migrations[0]}"
            exit 1
          fi

          source_sha_after="$(sha256sum "$source_migration" | awk '{print $1}')"
          isolated_sha_after="$(sha256sum "$isolated_migration" | awk '{print $1}')"
          if [ "$source_sha_before" != "$source_sha_after" ] || [ "$source_sha_before" != "$isolated_sha_after" ]; then
            echo "Receptionist migration changed while creating the isolated workspace."
            exit 1
          fi

          if find "$isolated_migrations" -mindepth 1 -maxdepth 1 ! -name "$TARGET_MIGRATION" | grep -q .; then
            echo "Legacy migrations remain in the isolated workspace."
            exit 1
          fi

      # Safety gate: fail closed if any required secret is missing, without
      # printing secret values.
      - name: Verify required Supabase secrets are configured
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_PROJECT_ID"
          test -n "$SUPABASE_DB_PASSWORD"

      # Safety gate: apply mode requires an exact human-entered confirmation
      # string before the workflow can run the production migration push.
      - name: Verify apply confirmation
        if: ${{ inputs.mode == 'apply' }}
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
        run: |
          if [ "$CONFIRMATION" != "APPLY_RECEPTIONIST_PERSISTENCE" ]; then
            echo "Apply mode requires the exact confirmation string."
            exit 1
          fi

      - name: Link Supabase project for audit
        if: ${{ inputs.mode == 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        working-directory: migration-source
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Link Supabase project for isolated migration
        if: ${{ inputs.mode != 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        working-directory: isolated-migration-source
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: List migration history for audit
        if: ${{ inputs.mode == 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: migration-source
        run: |
          set -o pipefail
          supabase migration list 2>&1 | tee ../supabase-migration-list.txt

      - name: List migration history for isolated migration
        if: ${{ inputs.mode != 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: isolated-migration-source
        run: |
          set -o pipefail
          supabase migration list 2>&1 | tee ../supabase-migration-list.txt

      # Safety gate: every run performs the dry run first so reviewers can see
      # the exact migration plan before apply mode reaches the write step.
      - name: Dry run migration push
        if: ${{ inputs.mode != 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: isolated-migration-source
        run: |
          set -o pipefail
          supabase db push --dry-run 2>&1 | tee ../supabase-dry-run.txt

      - name: Stop after dry run
        if: ${{ inputs.mode == 'dry-run' }}
        run: echo "Dry run completed. No migration was applied."

      # Safety gate: apply mode is allowed only when the dry run shows exactly
      # one pending migration, and that migration is the receptionist migration.
      - name: Verify apply migration scope
        if: ${{ inputs.mode == 'apply' }}
        run: node .github/scripts/verify-supabase-dry-run.mjs supabase-dry-run.txt

      - name: Apply migration push
        if: ${{ inputs.mode == 'apply' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: isolated-migration-source
        run: supabase db push

      - name: Verify applied migration history
        if: ${{ inputs.mode == 'apply' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: isolated-migration-source
        run: |
          set -o pipefail
          supabase migration list 2>&1 | tee ../supabase-migration-list-after-apply.txt
          if ! awk -F '|' -v target="$TARGET_MIGRATION_VERSION" '
            function normalize(value) {
              gsub(/[^0-9]/, "", value)
              return value
            }

            {
              local_version = normalize($1)
              remote_version = normalize($2)

              if (NF >= 3 && local_version == "") {
                local_version = normalize($2)
                remote_version = normalize($3)
              }

              if (local_version == target) {
                found_local = 1
                target_remote_version = remote_version
                if (remote_version == target) {
                  found_synced = 1
                }
              }
            }

            END {
              if (found_synced) {
                exit 0
              }

              if (found_local) {
                if (target_remote_version == "") {
                  print "Target migration was found in the Local column, but the Remote column was blank or missing." > "/dev/stderr"
                } else {
                  print "Target migration was found in the Local column, but the Remote column was " target_remote_version "." > "/dev/stderr"
                }
                exit 2
              }

              print "Target migration was not found in the Local column." > "/dev/stderr"
              exit 1
            }
          ' ../supabase-migration-list-after-apply.txt; then
            echo "Applied receptionist migration version $TARGET_MIGRATION_VERSION was not found with matching Local and Remote columns."
            exit 1
          fi

      # Read-only audit path: dump only public schema DDL so operators can
      # compare empty remote history with existing objects.
      - name: Dump remote public schema for audit
        if: ${{ inputs.mode == 'audit-history' }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        working-directory: migration-source
        run: supabase db dump --linked --schema public --file ../remote-public-schema.sql

      - name: Audit prior migration history
        if: ${{ inputs.mode == 'audit-history' }}
        run: node .github/scripts/audit-supabase-history.mjs migration-source

      - name: Remove raw schema dump
        if: ${{ inputs.mode == 'audit-history' && always() }}
        run: rm -f remote-public-schema.sql

      - name: Upload audit artifacts
        if: ${{ inputs.mode == 'audit-history' && always() }}
        uses: actions/upload-artifact@v4
        with:
          name: supabase-history-audit
          path: |
            supabase-history-audit.txt
            supabase-migration-list.txt
          retention-days: 7
